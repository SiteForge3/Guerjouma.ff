    <title>قرجومه | Elite Gaming</title>
    
    <style>
        /* ============ إعدادات أساسية ============ */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #ff3d3d;
            --accent-glow: rgba(255, 61, 61, 0.4);
            --youtube: #ff0000;
            --tiktok: #00f2ea;
            --instagram: #d62976;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
            letter-spacing: -0.01em;
        }

        /* ============ خلفية متحركة احترافية ============ */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particles::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(255, 61, 61, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(255, 61, 61, 0.02) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(214, 41, 118, 0.02) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* خطوط شبكية خفيفة */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.5) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* ============ الحاوية الرئيسية ============ */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 40px 24px;
        }

        /* ============ كارد رئيسي ============ */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 48px 32px 40px;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.4),
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 1px 0 rgba(255, 255, 255, 0.02) inset;
            transition: all 0.4s var(--transition-smooth);
        }

        /* تأثير حدود متوهجة */
        .profile-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            padding: 1px;
            background: linear-gradient(
                135deg,
                rgba(255, 61, 61, 0.3),
                transparent 40%,
                transparent 60%,
                rgba(255, 61, 61, 0.15)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.5s var(--transition-smooth);
        }

        .profile-card:hover::before {
            opacity: 1;
        }

        /* ============ صورة البروفايل ============ */
        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 28px;
        }

        .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-right-color: var(--accent);
            animation: ringRotate 4s linear infinite;
            opacity: 0.6;
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .avatar-ring:nth-child(2) {
            inset: -10px;
            border-top-color: transparent;
            border-right-color: transparent;
            border-bottom-color: var(--instagram);
            border-left-color: var(--instagram);
            animation-direction: reverse;
            animation-duration: 6s;
            opacity: 0.4;
        }

        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s var(--transition-smooth);
            filter: brightness(1.05) contrast(1.05);
            position: relative;
            z-index: 1;
            background: var(--bg-secondary);
        }

        .avatar-wrapper:hover .avatar-img {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        /* ============ المعلومات النصية ============ */
        .profile-info {
            text-align: center;
            margin-bottom: 36px;
        }

        .username {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
            color: var(--text-primary);
            position: relative;
            display: inline-block;
        }

        .username::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            opacity: 0.7;
        }

        .verified-badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
            50% { box-shadow: 0 0 0 8px transparent; }
        }

        .verified-badge::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
            font-weight: bold;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            margin-top: 4px;
        }

        .tag {
            display: inline-block;
            background: rgba(255, 61, 61, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 100px;
            margin-top: 10px;
            letter-spacing: 0.02em;
            border: 1px solid rgba(255, 61, 61, 0.15);
        }

        /* ============ فاصل ============ */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(

                var(--border-medium) 20%,

            margin-bottom: 32px;
        }

        /* ============ أزرار التواصل ============ */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            transition: all 0.35s var(--transition-smooth);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* تأثير الضوء عند hover */
        .link-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.03) 50%,
                transparent
            );
            transition: left 0.6s var(--transition-smooth);
        }

        .link-btn:hover::after {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            border-color: var(--border-medium);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .link-btn:active {
            transform: scale(0.98);
            transition: transform 0.15s var(--transition-smooth);
        }

        /* تخصيص كل منصة */

            border-left: 3px solid var(--youtube);

        .link-btn.youtube:hover {
            background: rgba(255, 0, 0, 0.08);
            border-color: rgba(255, 0, 0, 0.3);
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.15);

            border-left: 3px solid var(--tiktok);

        .link-btn.tiktok:hover {
            background: rgba(0, 242, 234, 0.06);
            border-color: rgba(0, 242, 234, 0.3);

        .link-btn.instagram {

        /* ============ أيقونات المنصات ============ */
        .platform-icon {

            align-items: center;

        }
        .platform-icon.ig {
            background: rgba(214, 41, 118, 0.15);

        }

        .link-label {
            flex: 1;
            text-align: right;
        }

        .link-label .platform-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .link-label .platform-handle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .arrow-icon {
            opacity: 0.3;
            transition: all 0.35s var(--transition-smooth);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .link-btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(-4px);
        }

        /* ============ تذييل ============ */
        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.05em;
            font-weight: 300;
        }

        /* ============ تحسينات الموبايل ============ */
        @media (max-width: 480px) {
            .profile-card {
                padding: 36px 20px 32px;
                border-radius: 20px;
            }
            
            .avatar-wrapper {
                width: 110px;
                height: 110px;
                margin-bottom: 24px;
            }
            
            .avatar-img {
                width: 110px;
                height: 110px;
            }
            
            .username {
                font-size: 1.5rem;
            }
            
            .bio {
                font-size: 0.85rem;
            }
            
            .link-btn {
                padding: 14px 16px;

                border-radius: 14px;
            }
            
            .platform-icon {
                width: 38px;
                height: 38px;
                border-radius: 10px;
                font-size: 1.1rem;
            }
            
            .links-stack {
                gap: 10px;
            }
        }

        @media (max-width: 360px) {
            .main-wrapper {
                padding: 20px 12px;
            }
            
            .profile-card {
                padding: 28px 14px 24px;
            }
            
            .avatar-wrapper {

            }
            
            .platform-icon {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
        }

        /* ============ أنيميشن الظهور ============ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.7s var(--transition-smooth) both;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* ============ تأثير Ripple للنقر ============ */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0);
            animation: rippleEffect 0.7s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>

        /**

        (function() {
            'use strict';

            // ============ Ripple Effect on Buttons ============
            function createRipple(event) {
                const button = event.currentTarget;
                const ripple = document.createElement('span');
                const rect = button.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = event.clientX - rect.left - size / 2;
                const y = event.clientY - rect.top - size / 2;

                ripple.classList.add('ripple');
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';

                button.appendChild(ripple);

                ripple.addEventListener('animationend', function() {
                    ripple.remove();
                });
            }

            // ============ Magnetic Hover Effect on Avatar ============
            function initMagneticEffect() {
                const avatar = document.querySelector('.avatar-wrapper');
                if (!avatar) return;

                avatar.addEventListener('mousemove', function(e) {
                    const rect = avatar.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const strength = 15;
                    
                    const img = avatar.querySelector('.avatar-img');
                    if (img) {
                        img.style.transform = `translate(${x / strength}px, ${y / strength}px) scale(1.05)`;
                    }
                });

                avatar.addEventListener('mouseleave', function() {
                    const img = avatar.querySelector('.avatar-img');
                    if (img) {
                        img.style.transform = 'translate(0, 0) scale(1)';
                    }
                });
            }

            // ============ Intersection Observer for Animation ============
            function initScrollReveal() {
                const elements = document.querySelectorAll('.animate-in');
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.style.animationPlayState = 'running';
                        }
                    });
                }, { threshold: 0.1 });

                elements.forEach(el => {
                    observer.observe(el);
                });
            }

            // ============ Initialize Everything ============
            function init() {
                // Add ripple to all buttons
                const buttons = document.querySelectorAll('.link-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', createRipple);
                });

                // Magnetic effect on avatar
                initMagneticEffect();

                // Scroll reveal (fallback if animations aren't visible)
                initScrollReveal();

                // Log (professional touch - for debugging)
                console.log('%c قرجومه %c Link Page Initialized ',
                    'background:#ff3d3d;color:white;padding:4px 8px;border-radius:4px 0 0 4px;font-weight:bold;',
                    'background:#1a1a1a;color:#a0a0a0;padding:4px 8px;border-radius:0 4px 4px 0;');
                console.log('%c Hand-crafted with precision • No AI shortcuts ',
                    'color:#666;font-style:italic;');
            }

            // Run when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
