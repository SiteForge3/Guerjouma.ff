<style>
:root {
--bg: #050505;
--bg-card: #0c0c0f;
--bg-elevated: #141418;
--fg: #f0f0f0;
--muted: #6b6b7b;
--accent: #ff2d2d;
--accent-soft: rgba(255, 45, 45, 0.12);
--accent-glow: rgba(255, 45, 45, 0.5);
--youtube: #ff0000;
--tiktok: #00f2ea;
--instagram: #e1306c;
--border: rgba(255, 255, 255, 0.05);
--border-hover: rgba(255, 255, 255, 0.12);
--radius: 20px;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html {
scroll-behavior: smooth;
font-size: 16px;
}

body {
font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
background: var(--bg);
color: var(--fg);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
overflow-x: hidden;
position: relative;
line-height: 1.5;
}

/* ========== CANVAS للجزيئات ========== */
#particleCanvas {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 0;
}

/* ========== توهج خلفي ========== */
.ambient-glow {
position: fixed;
pointer-events: none;
z-index: 0;
}

.ambient-glow.glow-1 {
top: -20%;
right: -20%;
width: 500px;
height: 500px;
background: radial-gradient(circle, rgba(255, 45, 45, 0.06) 0%, transparent 70%);
animation: floatGlow1 12s ease-in-out infinite;
}

.ambient-glow.glow-2 {
bottom: -15%;
left: -15%;
width: 400px;
height: 400px;
background: radial-gradient(circle, rgba(225, 48, 108, 0.04) 0%, transparent 70%);
animation: floatGlow2 15s ease-in-out infinite;
}

.ambient-glow.glow-3 {
top: 40%;
left: 50%;
transform: translateX(-50%);
width: 300px;
height: 300px;
background: radial-gradient(circle, rgba(255, 45, 45, 0.03) 0%, transparent 70%);
animation: floatGlow3 10s ease-in-out infinite;
}

@keyframes floatGlow1 {
0%, 100% { transform: translate(0, 0); }
50% { transform: translate(-30px, 20px); }
}
@keyframes floatGlow2 {
0%, 100% { transform: translate(0, 0); }
50% { transform: translate(20px, -30px); }
}
@keyframes floatGlow3 {
0%, 100% { transform: translateX(-50%) scale(1); }
50% { transform: translateX(-50%) scale(1.3); }
}

/* ========== شبكة خلفية ========== */
.grid-bg {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
opacity: 0.025;
background-image:
linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px);
background-size: 80px 80px;
mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
-webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
}

/* ========== خطوط مسحوبة خلفية ========== */
.scan-lines {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0, 0, 0, 0.03) 2px,
rgba(0, 0, 0, 0.03) 4px
);
opacity: 0.4;
}

/* ========== الحاوية الرئيسية ========== */
.main-container {
position: relative;
z-index: 10;
width: 100%;
max-width: 460px;
padding: 32px 20px;
}

/* ========== الكارد الرئيسي ========== */
.card {
position: relative;
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: 28px;
padding: 52px 32px 44px;
overflow: hidden;
box-shadow:
0 0 0 1px rgba(255,255,255,0.02) inset,
0 1px 0 rgba(255,255,255,0.03) inset,
0 20px 60px rgba(0,0,0,0.5),
0 4px 16px rgba(0,0,0,0.3);
transition: box-shadow 0.6s ease;
}

.card:hover {
box-shadow:
0 0 0 1px rgba(255,255,255,0.04) inset,
0 1px 0 rgba(255,255,255,0.05) inset,
0 25px 80px rgba(0,0,0,0.6),
0 4px 16px rgba(0,0,0,0.3),
0 0 120px -20px var(--accent-glow);
}

/* حد متوهج متحرك */
.card::before {
content: '';
position: absolute;
top: -1px;
left: -1px;
right: -1px;
bottom: -1px;
border-radius: 29px;
background: conic-gradient(
from var(--border-angle, 0deg),
transparent 0%,
var(--accent) 8%,
transparent 16%,
transparent 50%,
var(--instagram) 58%,
transparent 66%
);
z-index: -1;
opacity: 0.4;
animation: rotateBorder 8s linear infinite;
}

@property --border-angle {
syntax: '<angle>';
initial-value: 0deg;
inherits: false;
}

@keyframes rotateBorder {
to { --border-angle: 360deg; }
}

/* خلفية الكارد الداخلية */
.card::after {
content: '';
position: absolute;
inset: 1px;
border-radius: 27px;
background: var(--bg-card);
z-index: -1;
}

/* ========== الأفاتار ========== */
.avatar-section {
display: flex;
flex-direction: column;
align-items: center;
margin-bottom: 32px;
position: relative;
}

.avatar-container {
position: relative;
width: 140px;
height: 140px;
cursor: pointer;
}

/* حلقات دائرية متحركة */
.orbit-ring {
position: absolute;
border-radius: 50%;
border: 1.5px solid transparent;
}

.orbit-ring.ring-1 {
inset: -8px;
border-top-color: var(--accent);
border-left-color: var(--accent);
animation: spin 3s linear infinite;
opacity: 0.7;
}

.orbit-ring.ring-2 {
inset: -16px;
border-bottom-color: var(--instagram);
border-right-color: var(--instagram);
animation: spin 5s linear infinite reverse;
opacity: 0.35;
}

.orbit-ring.ring-3 {
inset: -24px;
border-top-color: var(--tiktok);
border-left-color: var(--tiktok);
animation: spin 7s linear infinite;
opacity: 0.2;
}

/* نقاط مدارية */
.orbit-dot {
position: absolute;
width: 6px;
height: 6px;
border-radius: 50%;
filter: blur(0.5px);
}

.orbit-dot.dot-1 {
top: -8px;
left: 50%;
transform: translateX(-50%);
background: var(--accent);
box-shadow: 0 0 12px var(--accent-glow);
animation: dotPulse 2s ease-in-out infinite;
}

.orbit-dot.dot-2 {
bottom: -16px;
right: -2px;
width: 5px;
height: 5px;
background: var(--instagram);
box-shadow: 0 0 10px rgba(225, 48, 108, 0.5);
animation: dotPulse 2.5s ease-in-out infinite 0.5s;
}

.orbit-dot.dot-3 {
top: 50%;
left: -24px;
width: 4px;
height: 4px;
background: var(--tiktok);
box-shadow: 0 0 8px rgba(0, 242, 234, 0.4);
animation: dotPulse 3s ease-in-out infinite 1s;
}

@keyframes spin {
to { transform: rotate(360deg); }
}

@keyframes dotPulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.6); }
}

.avatar-img {
width: 140px;
height: 140px;
border-radius: 50%;
object-fit: cover;
border: 3px solid rgba(255, 255, 255, 0.08);
position: relative;
z-index: 2;
background: var(--bg-elevated);
transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.avatar-container:hover .avatar-img {
transform: scale(1.08);
border-color: rgba(255, 45, 45, 0.3);
box-shadow:
0 0 0 8px rgba(255, 45, 45, 0.08),
0 0 60px rgba(255, 45, 45, 0.2);
}

/* ========== حالة أونلاين ========== */
.status-badge {
position: absolute;
bottom: 6px;
right: 6px;
width: 22px;
height: 22px;
background: #0c0c0f;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
z-index: 3;
border: 2.5px solid var(--bg-card);
}

.status-dot {
width: 12px;
height: 12px;
background: #00e676;
border-radius: 50%;
animation: statusPulse 2.5s ease-in-out infinite;
box-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
}

@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4); }
50% { box-shadow: 0 0 0 6px rgba(0, 230, 118, 0); }
}

/* ========== معلومات البروفايل ========== */
.profile-info {
text-align: center;
margin-bottom: 8px;
}

.name-row {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
margin-bottom: 6px;
}

.display-name {
font-size: 2rem;
font-weight: 900;
letter-spacing: -0.03em;
background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.2;
}

.verified {
width: 26px;
height: 26px;
background: linear-gradient(135deg, var(--accent), #ff6b6b);
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
animation: verifyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s both;
box-shadow: 0 0 16px var(--accent-glow);
}

.verified svg {
width: 13px;
height: 13px;
fill: white;
}

@keyframes verifyPop {
from { transform: scale(0) rotate(-90deg); opacity: 0; }
to { transform: scale(1) rotate(0deg); opacity: 1; }
}

.tagline {
color: var(--muted);
font-size: 0.95rem;
font-weight: 400;
margin-bottom: 12px;
}

/* ========== شارات ========== */
.badges-row {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
flex-wrap: wrap;
}

.badge {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 5px 14px;
border-radius: 100px;
font-size: 0.72rem;
font-weight: 700;
letter-spacing: 0.03em;
text-transform: uppercase;
}

.badge-fire {
background: linear-gradient(135deg, rgba(255, 45, 45, 0.15), rgba(255, 45, 45, 0.05));
color: var(--accent);
border: 1px solid rgba(255, 45, 45, 0.2);
}

.badge-elite {
background: linear-gradient(135deg, rgba(168, 130, 255, 0.12), rgba(168, 130, 255, 0.04));
color: #a882ff;
border: 1px solid rgba(168, 130, 255, 0.18);
}

.badge-icon {
font-size: 0.8rem;
}

/* ========== أزرار الروابط ========== */
.links-container {
margin-top: 28px;
display: flex;
flex-direction: column;
gap: 10px;
}

.link-card {
display: flex;
align-items: center;
gap: 16px;
padding: 18px 20px;
border-radius: 18px;
text-decoration: none;
color: var(--fg);
background: var(--bg-elevated);
border: 1px solid var(--border);
position: relative;
overflow: hidden;
cursor: pointer;
transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
-webkit-user-select: none;
user-select: none;
outline: none;
}

/* خط ملون على الجنب */
.link-card::before {
content: '';
position: absolute;
top: 12px;
bottom: 12px;
right: 0;
width: 3px;
border-radius: 0 3px 3px 0;
transition: all 0.4s ease;
opacity: 0.6;
}

.link-card.youtube::before { background: var(--youtube); }
.link-card.tiktok::before { background: var(--tiktok); }
.link-card.instagram::before { background: var(--instagram); }

/* توهج خلفي عند الـ hover */
.link-card::after {
content: '';
position: absolute;
inset: 0;
opacity: 0;
transition: opacity 0.4s ease;
border-radius: 18px;
}

.link-card.youtube::after {
background: radial-gradient(ellipse at 95% 50%, rgba(255, 0, 0, 0.08) 0%, transparent 60%);
}
.link-card.tiktok::after {
background: radial-gradient(ellipse at 95% 50%, rgba(0, 242, 234, 0.06) 0%, transparent 60%);
}
.link-card.instagram::after {
background: radial-gradient(ellipse at 95% 50%, rgba(225, 48, 108, 0.08) 0%, transparent 60%);
}

.link-card:hover {
transform: translateY(-3px) scale(1.01);
border-color: var(--border-hover);
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
}

.link-card:hover::after {
opacity: 1;
}

.link-card:hover::before {
opacity: 1;
top: 8px;
bottom: 8px;
}

.link-card:active {
transform: translateY(-1px) scale(0.99);
transition-duration: 0.1s;
}

/* أيقونة المنصة */
.link-icon {
width: 50px;
height: 50px;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
position: relative;
z-index: 1;
transition: all 0.4s ease;
}

.link-card:hover .link-icon {
transform: scale(1.1);
}

.link-icon.yt-icon {
background: linear-gradient(135deg, rgba(255, 0, 0, 0.18), rgba(255, 0, 0, 0.06));
color: #ff4444;
box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
}

.link-card:hover .link-icon.yt-icon {
box-shadow: 0 0 24px rgba(255, 0, 0, 0.2);
}

.link-icon.tt-icon {
background: linear-gradient(135deg, rgba(0, 242, 234, 0.12), rgba(0, 242, 234, 0.04));
color: #00f2ea;
}

.link-card:hover .link-icon.tt-icon {
box-shadow: 0 0 24px rgba(0, 242, 234, 0.15);
}

.link-icon.ig-icon {
background: linear-gradient(135deg, rgba(225, 48, 108, 0.18), rgba(131, 58, 180, 0.08));
color: #e1306c;
}

.link-card:hover .link-icon.ig-icon {
box-shadow: 0 0 24px rgba(225, 48, 108, 0.2);
}

.link-icon svg {
width: 22px;
height: 22px;
fill: currentColor;
}

/* نص الرابط */
.link-text {
flex: 1;
position: relative;
z-index: 1;
}

.link-platform {
font-weight: 700;
font-size: 0.95rem;
color: var(--fg);
margin-bottom: 1px;
}

.link-handle {
font-size: 0.78rem;
color: var(--muted);
font-weight: 400;
direction: ltr;
text-align: right;
}

/* سهم */
.link-arrow {
position: relative;
z-index: 1;
width: 36px;
height: 36px;
border-radius: 10px;
background: rgba(255, 255, 255, 0.03);
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: all 0.4s ease;
opacity: 0.4;
}

.link-card:hover .link-arrow {
opacity: 1;
background: rgba(255, 255, 255, 0.06);
transform: translateX(-4px);
}

.link-arrow svg {
width: 16px;
height: 16px;
fill: none;
stroke: currentColor;
stroke-width: 2;
stroke-linecap: round;
stroke-linejoin: round;
color: var(--fg);
}

/* ========== Ripple ========== */
.ripple-effect {
position: absolute;
border-radius: 50%;
background: rgba(255, 255, 255, 0.15);
transform: scale(0);
animation: rippleAnim 0.8s ease-out forwards;
pointer-events: none;
z-index: 0;
}

@keyframes rippleAnim {
to {
transform: scale(4);
opacity: 0;
}
}

/* ========== التذييل ========== */
.footer {
text-align: center;
margin-top: 28px;
position: relative;
z-index: 10;
}

.footer-text {
font-size: 0.72rem;
color: rgba(255, 255, 255, 0.15);
font-weight: 400;
letter-spacing: 0.04em;
}

.footer-heart {
color: var(--accent);
display: inline-block;
animation: heartBeat 1.5s ease-in-out infinite;
font-size: 0.65rem;
}

@keyframes heartBeat {
0%, 100% { transform: scale(1); }
15% { transform: scale(1.3); }
30% { transform: scale(1); }
45% { transform: scale(1.15); }
60% { transform: scale(1); }
}

/* ========== أنيميشن الظهور ========== */
@keyframes slideUp {
from {
opacity: 0;
transform: translateY(30px) scale(0.97);
filter: blur(8px);
}
to {
opacity: 1;
transform: translateY(0) scale(1);
filter: blur(0);
}
}

.anim {
opacity: 0;
animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.d1 { animation-delay: 0.05s; }
.d2 { animation-delay: 0.15s; }
.d3 { animation-delay: 0.25s; }
.d4 { animation-delay: 0.35s; }
.d5 { animation-delay: 0.45s; }
.d6 { animation-delay: 0.55s; }
.d7 { animation-delay: 0.65s; }
.d8 { animation-delay: 0.75s; }

/* ========== استجابة الشاشات ========== */
@media (max-width: 480px) {
.card {
padding: 40px 22px 36px;
border-radius: 24px;
}

.avatar-container {
width: 120px;
height: 120px;
}

.avatar-img {
width: 120px;
height: 120px;
}

.orbit-ring.ring-1 { inset: -6px; }
.orbit-ring.ring-2 { inset: -13px; }
.orbit-ring.ring-3 { inset: -20px; }

.display-name {
font-size: 1.7rem;
}

.link-card {
padding: 16px 18px;
gap: 14px;
border-radius: 16px;
}

.link-icon {
width: 46px;
height: 46px;
border-radius: 12px;
}

.link-icon svg {
width: 20px;
height: 20px;
}
}

@media (max-width: 360px) {
.main-container {
padding: 16px 10px;
}

.card {
padding: 32px 16px 28px;
border-radius: 20px;
}

.avatar-container {
width: 100px;
height: 100px;
}

.avatar-img {
width: 100px;
height: 100px;
}

.display-name {
font-size: 1.45rem;
}

.link-card {
padding: 14px 14px;
gap: 10px;
}

.link-icon {
width: 40px;
height: 40px;
border-radius: 10px;
}

.link-arrow {
width: 30px;
height: 30px;
}

.badge {
padding: 4px 10px;
font-size: 0.65rem;
}
}

/* ========== تقليل الحركة ========== */
@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
transition-duration: 0.01ms !important;
}
}
</style></head>

<script>
(function() {
'use strict';

/* ============================
نظام الجزيئات (Canvas)
============================ */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouseX = -1000;
let mouseY = -1000;
let animFrameId = null;

function resizeCanvas() {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

class Particle {
constructor() {
this.reset();
}

reset() {
this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;
this.size = Math.random() * 1.5 + 0.3;
this.speedX = (Math.random() - 0.5) * 0.3;
this.speedY = (Math.random() - 0.5) * 0.3;
this.opacity = Math.random() * 0.4 + 0.1;
this.baseOpacity = this.opacity;
this.hue = Math.random() > 0.7 ? 0 : (Math.random() > 0.5 ? 330 : 180);
this.saturation = this.hue === 180 ? 80 : 70;
this.lightness = 55;
}

update() {
this.x += this.speedX;
this.y += this.speedY;

// تفاعل مع الماوس
const dx = this.x - mouseX;
const dy = this.y - mouseY;
const dist = Math.sqrt(dx * dx + dy * dy);
const maxDist = 150;

if (dist < maxDist) {
const force = (1 - dist / maxDist) * 0.5;
this.x += (dx / dist) * force;
this.y += (dy / dist) * force;
this.opacity = Math.min(1, this.baseOpacity + (1 - dist / maxDist) * 0.6);
} else {
this.opacity += (this.baseOpacity - this.opacity) * 0.05;
}

// إعادة التموضع إذا خرجت من الشاشة
if (this.x < -10) this.x = canvas.width + 10;
if (this.x > canvas.width + 10) this.x = -10;
if (this.y < -10) this.y = canvas.height + 10;
if (this.y > canvas.height + 10) this.y = -10;
}

draw() {
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.opacity})`;
ctx.fill();
}
}

function initParticles() {
const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));
particles = [];
for (let i = 0; i < count; i++) {
particles.push(new Particle());
}
}

function drawConnections() {
const maxConnDist = 120;
for (let i = 0; i < particles.length; i++) {
for (let j = i + 1; j < particles.length; j++) {
const dx = particles[i].x - particles[j].x;
const dy = particles[i].y - particles[j].y;
const dist = Math.sqrt(dx * dx + dy * dy);

if (dist < maxConnDist) {
const opacity = (1 - dist / maxConnDist) * 0.08;
ctx.beginPath();
ctx.moveTo(particles[i].x, particles[i].y);
ctx.lineTo(particles[j].x, particles[j].y);
ctx.strokeStyle = `rgba(255, 45, 45, ${opacity})`;
ctx.lineWidth = 0.5;
ctx.stroke();
}
}
}
}

function animateParticles() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

particles.forEach(p => {
p.update();
p.draw();
});

drawConnections();
animFrameId = requestAnimationFrame(animateParticles);
}

// تتبع الماوس
document.addEventListener('mousemove', function(e) {
mouseX = e.clientX;
mouseY = e.clientY;
});

document.addEventListener('mouseleave', function() {
mouseX = -1000;
mouseY = -1000;
});

// تتبع اللمس
document.addEventListener('touchmove', function(e) {
if (e.touches.length > 0) {
mouseX = e.touches[0].clientX;
mouseY = e.touches[0].clientY;
}
}, { passive: true });

document.addEventListener('touchend', function() {
mouseX = -1000;
mouseY = -1000;
});

// تهيئة الكانفاس
resizeCanvas();
initParticles();
animateParticles();

window.addEventListener('resize', function() {
resizeCanvas();
initParticles();
});

/* ============================
تأثير Magnetic على الأفاتار
============================ */
var avatarContainer = document.getElementById('avatarContainer');
if (avatarContainer) {
avatarContainer.addEventListener('mousemove', function(e) {
var rect = avatarContainer.getBoundingClientRect();
var x = e.clientX - rect.left - rect.width / 2;
var y = e.clientY - rect.top - rect.height / 2;
var img = avatarContainer.querySelector('.avatar-img');
if (img) {
img.style.transform = 'translate(' + (x / 10) + 'px, ' + (y / 10) + 'px) scale(1.08)';
}
});

avatarContainer.addEventListener('mouseleave', function() {
var img = avatarContainer.querySelector('.avatar-img');
if (img) {
img.style.transform = 'translate(0, 0) scale(1)';
}
});
}

/* ============================
تأثير Ripple
============================ */
var linkCards = document.querySelectorAll('.link-card');
linkCards.forEach(function(card) {
card.addEventListener('click', function(e) {
var ripple = document.createElement('span');
ripple.className = 'ripple-effect';
var rect = card.getBoundingClientRect();
var size = Math.max(rect.width, rect.height);
var x = e.clientX - rect.left - size / 2;
var y = e.clientY - rect.top - size / 2;
ripple.style.width = size + 'px';
ripple.style.height = size + 'px';
ripple.style.left = x + 'px';
ripple.style.top = y + 'px';
card.appendChild(ripple);
ripple.addEventListener('animationend', function() {
ripple.remove();
});
});
});

/* ============================
تأثير Tilt خفيف على الكارد
============================ */
var card = document.querySelector('.card');
if (card) {
card.addEventListener('mousemove', function(e) {
var rect = card.getBoundingClientRect();
var x = (e.clientX - rect.left) / rect.width - 0.5;
var y = (e.clientY - rect.top) / rect.height - 0.5;
card.style.transform = 'perspective(1000px) rotateY(' + (x * 2) + 'deg) rotateX(' + (-y * 2) + 'deg)';
});

card.addEventListener('mouseleave', function() {
card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
card.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
setTimeout(function() {
card.style.transition = '';
}, 600);
});
}

/* ============================
طباعة في الكونسول
============================ */
console.log('%c قرجومه ', 'background: linear-gradient(135deg, #ff2d2d, #ff6b6b); color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: bold; font-family: Tajawal, sans-serif;');
console.log('%c Elite Gaming Link Page ', 'color: #6b6b7b; font-style: italic; font-family: Tajawal, sans-serif;');

})();
</script></body>
